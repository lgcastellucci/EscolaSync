  <line x1="128" y1="266" x2="218" y2="266" stroke="#42A5F5" stroke-width="3" stroke-linecap="round" opacity="0.35"/>

  <!-- Linhas livro direito -->
  <line x1="294" y1="200" x2="384" y2="200" stroke="#42A5F5" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
  <line x1="294" y1="222" x2="384" y2="222" stroke="#42A5F5" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
  <line x1="294" y1="244" x2="384" y2="244" stroke="#42A5F5" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
  <line x1="294" y1="266" x2="384" y2="266" stroke="#42A5F5" stroke-width="3" stroke-linecap="round" opacity="0.35"/>

  <!-- Círculo verde com seta de upload -->
