  <!-- Livro - capa esquerda -->
  <rect x="108" y="148" width="130" height="192" rx="8" fill="#0D47A1"/>
  <rect x="108" y="148" width="130" height="192" rx="8" fill="none" stroke="#42A5F5" stroke-width="3"/>

  <!-- Livro - capa direita -->
  <rect x="274" y="148" width="130" height="192" rx="8" fill="#0D47A1"/>
  <rect x="274" y="148" width="130" height="192" rx="8" fill="none" stroke="#42A5F5" stroke-width="3"/>

  <!-- Lombada -->
  <rect x="234" y="140" width="44" height="208" rx="6" fill="#1976D2"/>
  <rect x="234" y="140" width="44" height="208" rx="6" fill="none" stroke="#42A5F5" stroke-width="2"/>

  <!-- Linhas livro esquerdo -->
  <line x1="128" y1="200" x2="218" y2="200" stroke="#42A5F5" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
  <line x1="128" y1="222" x2="218" y2="222" stroke="#42A5F5" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
